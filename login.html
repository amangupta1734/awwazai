<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awwazai — Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 2px solid #6366f1; color: #6366f1; }
        .tab-inactive { border-bottom: 2px solid transparent; color: #9ca3af; }
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #1f2937 inset !important;
            -webkit-text-fill-color: #f9fafb !important;
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="flex items-center justify-center mb-8">
        <svg class="w-10 h-10 mr-3 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
        </svg>
        <h1 class="text-3xl font-bold text-white">Awwazai</h1>
    </div>

    <p class="text-center text-gray-400 mb-8 text-sm">AI-powered meeting transcription & summarization</p>

    <!-- Card -->
    <div class="bg-gray-800 rounded-2xl shadow-2xl border border-gray-700 overflow-hidden">

        <!-- Tabs -->
        <div class="flex border-b border-gray-700">
            <button id="tab-login" onclick="switchTab('login')"
                class="flex-1 py-4 text-sm font-semibold tab-active transition-colors">
                Sign In
            </button>
            <button id="tab-register" onclick="switchTab('register')"
                class="flex-1 py-4 text-sm font-semibold tab-inactive transition-colors">
                Create Account
            </button>
        </div>

        <!-- Login Form -->
        <div id="form-login" class="p-8">
            <h2 class="text-xl font-bold text-white mb-6">Welcome back</h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                    <input id="login-email" type="email" placeholder="you@example.com"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 transition"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <input id="login-password" type="password" placeholder="••••••••"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 transition"
                        onkeydown="if(event.key==='Enter') doLogin()"/>
                </div>
                <div class="flex items-center gap-2">
                    <input id="login-remember" type="checkbox" class="accent-indigo-500 w-4 h-4"/>
                    <label for="login-remember" class="text-sm text-gray-400">Remember me</label>
                </div>
            </div>

            <p id="login-error" class="mt-3 text-red-400 text-sm hidden"></p>

            <button onclick="doLogin()" id="login-btn"
                class="w-full mt-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition">
                Sign In
            </button>

            <p class="mt-4 text-center text-sm text-gray-400">
                Don't have an account?
                <button onclick="switchTab('register')" class="text-indigo-400 hover:text-indigo-300 font-medium">Create one</button>
            </p>
        </div>

        <!-- Register Form -->
        <div id="form-register" class="p-8 hidden">
            <h2 class="text-xl font-bold text-white mb-6">Create your account</h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Full Name</label>
                    <input id="reg-name" type="text" placeholder="Aman Sharma"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 transition"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                    <input id="reg-email" type="email" placeholder="you@example.com"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 transition"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <input id="reg-password" type="password" placeholder="Min. 6 characters"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 transition"/>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Confirm Password</label>
                    <input id="reg-confirm" type="password" placeholder="••••••••"
                        class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500 transition"
                        onkeydown="if(event.key==='Enter') doRegister()"/>
                </div>
            </div>

            <p id="reg-error" class="mt-3 text-red-400 text-sm hidden"></p>
            <p id="reg-success" class="mt-3 text-green-400 text-sm hidden"></p>

            <button onclick="doRegister()" id="register-btn"
                class="w-full mt-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition">
                Create Account
            </button>

            <p class="mt-4 text-center text-sm text-gray-400">
                Already have an account?
                <button onclick="switchTab('login')" class="text-indigo-400 hover:text-indigo-300 font-medium">Sign in</button>
            </p>
        </div>

    </div>

    <p class="text-center text-xs text-gray-600 mt-6">© 2026 Awwazai · Final Year Project</p>
</div>

<script>
    const API_BASE_URL = window.location.origin;

    // If already logged in, redirect to dashboard
    const existingToken = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
    if (existingToken) window.location.href = '/';

    function switchTab(tab) {
        const isLogin = tab === 'login';

        document.getElementById('form-login').classList.toggle('hidden', !isLogin);
        document.getElementById('form-register').classList.toggle('hidden', isLogin);

        document.getElementById('tab-login').className = `flex-1 py-4 text-sm font-semibold transition-colors ${isLogin ? 'tab-active' : 'tab-inactive'}`;
        document.getElementById('tab-register').className = `flex-1 py-4 text-sm font-semibold transition-colors ${!isLogin ? 'tab-active' : 'tab-inactive'}`;

        // Clear errors
        document.getElementById('login-error').classList.add('hidden');
        document.getElementById('reg-error').classList.add('hidden');
        document.getElementById('reg-success').classList.add('hidden');
    }

    function showError(id, msg) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    function setLoading(btnId, loading, defaultText) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        btn.textContent = loading ? 'Please wait...' : defaultText;
        btn.classList.toggle('opacity-60', loading);
    }

    async function doLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const remember = document.getElementById('login-remember').checked;

        document.getElementById('login-error').classList.add('hidden');

        if (!email || !password) {
            showError('login-error', 'Please enter your email and password.');
            return;
        }

        setLoading('login-btn', true, 'Sign In');

        try {
            const resp = await fetch(`${API_BASE_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, remember })
            });

            const data = await resp.json();

            if (!resp.ok) {
                showError('login-error', data.detail || 'Invalid email or password.');
                return;
            }

            // Store token
            const storage = remember ? localStorage : sessionStorage;
            storage.setItem('auth_token', data.token);
            storage.setItem('user_email', email);
            storage.setItem('user_name', data.name || email);

            window.location.href = '/';

        } catch (err) {
            showError('login-error', 'Cannot connect to server. Please try again.');
        } finally {
            setLoading('login-btn', false, 'Sign In');
        }
    }

    async function doRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;

        document.getElementById('reg-error').classList.add('hidden');
        document.getElementById('reg-success').classList.add('hidden');

        if (!name || !email || !password || !confirm) {
            showError('reg-error', 'Please fill in all fields.');
            return;
        }
        if (password.length < 6) {
            showError('reg-error', 'Password must be at least 6 characters.');
            return;
        }
        if (password !== confirm) {
            showError('reg-error', 'Passwords do not match.');
            return;
        }

        setLoading('register-btn', true, 'Create Account');

        try {
            const resp = await fetch(`${API_BASE_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            const data = await resp.json();

            if (!resp.ok) {
                showError('reg-error', data.detail || 'Registration failed. Please try again.');
                return;
            }

            // Show success then auto-login
            const successEl = document.getElementById('reg-success');
            successEl.textContent = '✅ Account created! Signing you in...';
            successEl.classList.remove('hidden');

            // Auto-login after registration
            setTimeout(async () => {
                const loginResp = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, remember: false })
                });
                const loginData = await loginResp.json();
                if (loginResp.ok) {
                    sessionStorage.setItem('auth_token', loginData.token);
                    sessionStorage.setItem('user_email', email);
                    sessionStorage.setItem('user_name', name);
                    window.location.href = '/';
                } else {
                    switchTab('login');
                    document.getElementById('login-email').value = email;
                }
            }, 1000);

        } catch (err) {
            showError('reg-error', 'Cannot connect to server. Please try again.');
        } finally {
            setLoading('register-btn', false, 'Create Account');
        }
    }
</script>

</body>
</html>
